<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship Board</title>
    <link rel="icon" type="image/png" sizes="32*32" href="/battleship/battleship.png">
    <link rel="icon" type="image/png" sizes="16*16" href="/battleship/battleship.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
<h1>BATTLESHIP</h1>
<p id="version"></p>

<div id="placement-ui">
    <p id="placement-label">Place your Carrier (5 cells)</p>
    <button id="toggleOrientation" onclick="toggleOrientation()">Orientation: Horizontal</button>
    <button id="confirmPlacement" onclick="confirmPlacement()" disabled>Start Game</button>
</div>

<div class="boards-container">

    <div class="board-section">
        <h2>Your Board</h2>
        <div class="board-container" id="human-container">
            <table id="human-board"></table>
        </div>
        <h2>Computer's Attack</h2>
        <p class="board-message" id="computer-message"></p>
    </div>

    <div class="board-section">
        <h2>Computer's Board</h2>
        <div class="board-container" id="computer-container">
            <table id="computer-board"></table>
        </div>
        <h2>Your Attack</h2>
        <p class="board-message" id="message"></p>
    </div>

</div>

<div class="game-controls">
    <h3 id="guesses-left"></h3>
    <button id="userFeedbackButton" onclick="handleFeedbackClick()">Submit Game Feedback</button>
</div>

<script src="script.js"></script>
</body>
</html>
